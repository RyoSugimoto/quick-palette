name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @quick-palette/web exec playwright install --with-deps chromium
      - run: pnpm test:all
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-review-screenshots
          path: apps/web/test-results/*.png
          if-no-files-found: ignore
